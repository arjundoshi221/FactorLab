# House Clerk PTR asset type codes
# Source: https://fd.house.gov/reference/asset-type-codes.aspx
# Fetched: 2026-04-29
#
# `equity_ticker_likely` flags codes where a public US equity ticker is expected
# in the asset name (e.g. "BlackRock, Inc. Common Stock (BLK) [ST]"). Used by
# the parser/enricher to know when a missing ticker is a real ticker-resolution
# failure vs. a structurally-tickerless asset.


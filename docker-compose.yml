services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: factorlab-db
    environment:
      POSTGRES_DB: factorlab
      POSTGRES_USER: factorlab
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factorlab_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factorlab"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
